name: CI

on:
  push:
    branches:
      - master
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-musl-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: syo-linux-x86_64-musl
            binary: target/x86_64-unknown-linux-musl/release/syo
          - name: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: syo-windows-x86_64.exe
            binary: target/x86_64-pc-windows-msvc/release/syo.exe
          - name: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            artifact: syo-macos-aarch64
            binary: target/aarch64-apple-darwin/release/syo

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Add Rust target
        run: rustup target add "${{ matrix.target }}"

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build release binary
        run: cargo build --release -p syo --target "${{ matrix.target }}" --locked

      - name: Prepare artifact
        run: |
          mkdir -p dist
          cp "${{ matrix.binary }}" "dist/${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: error
release:
  name: Release
  runs-on: ubuntu-latest
  needs: build
  if: startsWith(github.ref, 'refs/tags/')
  permissions:
    contents: write

  steps:
    - name: Download artifacts
      uses: actions/download-artifact@v8
      with:
        path: dist
        merge-multiple: true

    - name: Publish GitHub release
      uses: softprops/action-gh-release@v3
      with:
        files: dist/*
        name: ${{ github.ref_name }}
        generate_release_notes: true
        fail_on_unmatched_files: true